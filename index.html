<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#020617,#0a2540,#000);
color:#e2e8f0;
overflow-x:hidden;
}

header{
position:fixed;width:100%;top:0;
background:rgba(2,6,23,0.8);
backdrop-filter:blur(12px);
display:flex;justify-content:space-between;align-items:center;
padding:15px 20px;z-index:1000;
}

header h1{color:#38bdf8}

.menu-btn{
display:none;
font-size:1.8rem;
color:#38bdf8;
cursor:pointer;
}

nav a{
color:#fff;
margin-left:20px;
cursor:pointer;
}

section{
display:none;
padding:120px 20px;
min-height:100vh;
animation:fadeIn .6s ease;
}

.active{display:block}

.section-box{
max-width:1000px;
margin:auto;
padding:25px;
background:rgba(2,6,23,0.7);
border-radius:20px;
backdrop-filter:blur(10px);
}

.hero{text-align:center}
.hero img{
width:150px;height:150px;border-radius:50%;
border:3px solid #38bdf8;
box-shadow:0 0 20px #38bdf8;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
padding:20px;
border-radius:15px;
background:rgba(2,6,23,0.6);
transition:.3s;
}
.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(56,189,248,.3);
}

.btn{
padding:10px 20px;
background:#38bdf8;
border:none;border-radius:5px;
cursor:pointer;
}

/* MOBILE MENU */
@media(max-width:768px){

.menu-btn{display:block}

nav{
position:fixed;
top:0;
right:-220px;
width:200px;
height:100vh;
background:#020617;
display:flex;
flex-direction:column;
padding-top:80px;
transition:.3s;
}

nav a{
margin:20px;
}

nav.active{right:0}

}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<header>
<h1>MyPortfolio</h1>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<nav>
<a onclick="showSection('home')">Home</a>
<a onclick="showSection('about')">About</a>
<a onclick="showSection('skills')">Skills</a>
<a onclick="showSection('certificates')">Certificates</a>
<a onclick="showSection('projects')">Projects</a>
<a onclick="showSection('contact')">Contact</a>
</nav>
</header>

<section id="home" class="active hero">
<img src="profile.jpg">
<h2>Hi I'm Akash</h2>
<p>Web Developer</p>
</section>

<section id="about"><div class="section-box">
<h2>About Me</h2>
<p>Hello! I am Akash V, a Computer Science student passionate about development.</p>
</div></section>

<section id="skills"><div class="section-box">
<h2>Skills</h2>
<div class="grid">
<div class="card">HTML</div>
<div class="card">CSS</div>
<div class="card">JavaScript</div>
</div>
</div></section>

<section id="certificates"><div class="section-box">
<h2>Certificates</h2>
<div class="grid">
<div class="card"><img src="cert1.jpg"></div>
<div class="card"><img src="cert2.jpg"></div>
</div>
</div></section>

<section id="projects"><div class="section-box">
<h2>Projects</h2>
<div class="grid">
<div class="card"><a href="https://animated-dark-web.preview.emergentagent.com/campusconnect/home.html" target="_blank">Project 1</a></div>
<div class="card"><a href="https://ideal-budget-pc-for-dail-2tkurhk.gamma.site/" target="_blank">Project 2</a></div>
</div>
</div></section>

<section id="contact"><div class="section-box">
<h2>Contact</h2>
<p>📱 9778782769</p>
<p>📸 ak4sh_v</p>
</div></section>

<script>
function showSection(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function toggleMenu(){
document.querySelector('nav').classList.toggle('active');
}
</script>

</body>
</html>
